name: Import dashboard files

on:
  push:
    branches: [main]
    paths:
      - import.ready

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack project
        shell: bash
        run: |
          if [ ! -f import.ready ]; then
            exit 0
          fi
          cat archive.part-* > global-market-dashboard-export.zip.b64
          base64 --decode global-market-dashboard-export.zip.b64 > global-market-dashboard-export.zip
          unzip -o global-market-dashboard-export.zip -d .
          rm global-market-dashboard-export.zip global-market-dashboard-export.zip.b64 import.ready archive.part-*
      - name: Commit imported files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Import global market dashboard"
          git push
