name: Import dashboard files

on:
  push:
    branches: [main]
    paths:
      - global-market-dashboard-export.zip.b64

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack project
        shell: bash
        run: |
          if [ ! -f global-market-dashboard-export.zip.b64 ]; then
            exit 0
          fi
          base64 --decode global-market-dashboard-export.zip.b64 > global-market-dashboard-export.zip
          unzip -o global-market-dashboard-export.zip -d .
          rm global-market-dashboard-export.zip global-market-dashboard-export.zip.b64
      - name: Commit imported files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Import global market dashboard"
          git push
